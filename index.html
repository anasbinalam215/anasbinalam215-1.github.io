<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Space</title>
    <style>
        :root {
            --bg-color: #ffeef2;
            --heart-color: #ff4d6d;
            --heart-hover: #ff758f;
            --text-color: #5c001e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #1a1a1a; /* Dark initial look for password screen */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 1s ease;
        }

        /* --- PASSWORD GATE --- */
        #password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        .login-box {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 360px;
        }

        .login-box h2 {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 400;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #444;
            border-radius: 8px;
            background: #333;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            border-color: var(--heart-color);
        }

        .login-box button {
            background: var(--heart-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }

        .login-box button:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #ff4d6d;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        /* --- MAIN CONTENT (LOVE THEMED) --- */
        #main-content {
            display: none;
            opacity: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            transition: opacity 1s ease;
        }

        .header-text {
            color: var(--text-color);
            font-size: 2rem;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            animation: fadeInDown 1s ease;
        }

        /* Fixed Vertical Container - Forces midline centering */
        .links-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px; /* Space between buttons when stacked */
            width: 100%;
            max-width: 400px;
            padding: 10px;
        }

        /* Heart Button Styling */
        .heart-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            animation: scaleIn 0.5s ease backwards;
            width: fit-content;
        }

        .heart-button {
            position: relative;
            width: 100px;
            height: 90px;
            cursor: pointer;
            background: none;
            border: none;
            outline: none;
            filter: drop-shadow(0 4px 8px rgba(255, 77, 109, 0.3));
            transition: transform 0.3s ease, filter 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Creating the heart shape using CSS shapes */
        .heart-button::before,
        .heart-button::after {
            content: "";
            position: absolute;
            top: 0;
            width: 50px;
            height: 80px;
            border-radius: 50px 50px 0 0;
            background: var(--heart-color);
            transition: background 0.3s ease;
        }

        .heart-button::before {
            left: 50px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-button::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        /* Hover and touch states */
        .heart-btn-wrapper:hover .heart-button {
            transform: scale(1.1);
            filter: drop-shadow(0 6px 12px rgba(255, 77, 109, 0.5));
        }

        .heart-btn-wrapper:hover .heart-button::before,
        .heart-btn-wrapper:hover .heart-button::after {
            background: var(--heart-hover);
        }

        .heart-btn-wrapper:active .heart-button {
            transform: scale(0.95);
        }

        .heart-label {
            margin-top: 10px;
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }

        /* Floating background hearts effect */
        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.15);
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
            z-index: 0;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .header-text { font-size: 1.6rem; margin-bottom: 30px; }
            .heart-button { width: 90px; height: 81px; }
            .heart-button::before, .heart-button::after { width: 45px; height: 72px; }
            .heart-button::before { left: 45px; }
            .heart-label { font-size: 0.95rem; }
            .links-container { gap: 25px; }
        }
    </style>
</head>
<body>

    <div id="password-screen">
        <div class="login-box">
            <h2>Enter Security Code</h2>
            <input type="password" id="password-input" placeholder="••••••••" autocomplete="off">
            <button onclick="checkPassword()">Unlock</button>
            <div id="error-message" class="error-msg">Incorrect code. Please try again.</div>
        </div>
    </div>

    <div id="main-content">
        <h1 class="header-text">Welcome to Our Memories</h1>
        
        <div class="links-container" id="links-container">
            
            <a href="https://anasbinalam215.github.io/" class="heart-btn-wrapper" target="_blank">
                <button class="heart-button" aria-label="Anniversary Link"></button>
                <span class="heart-label">Anniversary Wish</span>
            </a>
            </div>
    </div>

    <script>
        // Password logic
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const error = document.getElementById('error-message');
            
            if (input === "17062025") {
                // Hide password screen
                document.getElementById('password-screen').style.display = 'none';
                
                // Show love theme content smoothly
                document.body.style.backgroundColor = '#ffeef2';
                const mainContent = document.getElementById('main-content');
                mainContent.style.display = 'flex';
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                }, 50);

                // Start background floating elements
                setInterval(createBgHeart, 400);
            } else {
                error.style.display = 'block';
                document.getElementById('password-input').value = '';
            }
        }

        // Allow pressing "Enter" key to submit password
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // Background decorative hearts generator
        function createBgHeart() {
            if(document.getElementById('main-content').style.display === 'flex') {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 7000);
            }
        }
    </script>
</body>
</html>
